name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate compose
        run: docker compose --env-file .env.example -f infra/docker-compose.yml config >/dev/null

      - name: Run unit suite
        run: bash scripts/test.sh unit

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run integration suite
        run: bash scripts/test.sh integration

  contract:
    name: Contract
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run contract suite
        run: bash scripts/test.sh contract

  smoke:
    name: Smoke
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs:
      - unit
      - integration
      - contract
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run smoke suite
        run: bash scripts/test.sh smoke
