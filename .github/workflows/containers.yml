name: Containers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: containers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: edge
            context: service-api/service-golang/edge
          - image: crm
            context: service-api/service-golang/crm
          - image: sales
            context: service-api/service-golang/sales
          - image: rentals
            context: service-api/service-golang/rentals
          - image: documents
            context: service-api/service-golang/documents
          - image: identity
            context: service-api/service-csharp/identity
          - image: billing
            context: service-api/service-csharp/billing
          - image: finance
            context: service-api/service-csharp/finance
          - image: workflow-control
            context: service-api/service-typescript/workflow-control
          - image: engagement
            context: service-api/service-typescript/engagement
          - image: workflow-runtime
            context: service-api/service-elixir/workflow-runtime
          - image: analytics
            context: service-api/service-python/analytics
          - image: simulation
            context: service-api/service-python/simulation
          - image: catalog
            context: service-api/service-python/catalog
          - image: platform-control
            context: service-api/service-python/platform-control
          - image: search
            context: service-api/service-python/search
          - image: ai-governance
            context: service-api/service-python/ai-governance
          - image: support
            context: service-api/service-python/support
          - image: supplier
            context: service-api/service-python/supplier
          - image: accounting
            context: service-api/service-python/accounting
          - image: inventory
            context: service-api/service-python/inventory
          - image: procurement
            context: service-api/service-python/procurement
          - image: banking
            context: service-api/service-python/banking
          - image: notification
            context: service-api/service-python/notification
          - image: fiscal
            context: service-api/service-python/fiscal
          - image: webhook-hub
            context: service-api/service-rust/webhook-hub
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erp-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }},ignore-error=true

      - name: Scan image vulnerabilities
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
