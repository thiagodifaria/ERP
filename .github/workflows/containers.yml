name: Containers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: containers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: edge
            context: service-api/service-golang/edge
          - image: crm
            context: service-api/service-golang/crm
          - image: sales
            context: service-api/service-golang/sales
          - image: rentals
            context: service-api/service-golang/rentals
          - image: identity
            context: service-api/service-csharp/identity
          - image: workflow-control
            context: service-api/service-typescript/workflow-control
          - image: workflow-runtime
            context: service-api/service-elixir/workflow-runtime
          - image: analytics
            context: service-api/service-python/analytics
          - image: simulation
            context: service-api/service-python/simulation
          - image: webhook-hub
            context: service-api/service-rust/webhook-hub
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erp-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }},ignore-error=true
