openapi: 3.1.0
info:
  title: ERP CRM API
  version: 0.2.0
  description: CRM leads, customers, activity, attachments and commercial intelligence.
paths:
  /api/crm/enrichment/cnpj/capabilities:
    get:
      summary: Read CNPJ enrichment provider capabilities
      responses:
        "200":
          description: Provider capability catalog
  /api/crm/enrichment/cnpj/lookup:
    post:
      summary: Lookup and enrich one CNPJ through provider contract
      responses:
        "200":
          description: Enriched company profile
  /api/crm/pipeline/config:
    get:
      summary: Read tenant pipeline configuration
      parameters:
        - in: query
          name: tenantSlug
          schema:
            type: string
      responses:
        "200":
          description: Pipeline configuration
    put:
      summary: Upsert tenant pipeline configuration
      responses:
        "200":
          description: Upserted pipeline configuration
  /api/crm/leads/intelligence/summary:
    get:
      summary: Read lead scoring and pipeline intelligence summary
      parameters:
        - in: query
          name: tenantSlug
          schema:
            type: string
      responses:
        "200":
          description: Lead intelligence summary
