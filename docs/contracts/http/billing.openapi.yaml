openapi: 3.1.0
info:
  title: ERP Billing API
  version: 1.0.0
  description: Subscription billing, invoices, gateway capabilities, payment attempts, webhooks and recovery operations.
security:
  - bearerAuth: []
paths:
  /api/billing/events:
    get:
      summary: Read billing events
      responses:
        "200":
          description: Operation result
  /api/billing/gateways:
    get:
      summary: Read billing gateways
      responses:
        "200":
          description: Operation result
  /api/billing/gateways/{provider}:
    get:
      summary: Read billing gateways provider
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Operation result
  /api/billing/invoices:
    get:
      summary: Read billing invoices
      responses:
        "200":
          description: Operation result
  /api/billing/invoices/{publicId}:
    get:
      summary: Read billing invoices publicId
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Operation result
  /api/billing/invoices/{publicId}/attempts:
    get:
      summary: Read billing invoices publicId attempts
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Operation result
    post:
      summary: Create or execute billing invoices publicId attempts
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
      responses:
        "200":
