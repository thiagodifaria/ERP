openapi: 3.1.0
info:
  title: ERP Webhook Hub API
  version: 0.9.7
  description: Inbound webhook intake, DLQ and operator recovery surface.
servers:
  - url: http://localhost:8082
security:
  - bearerAuth: []
paths:
  /health/details:
    get:
      summary: Return readiness details for webhook runtime
      responses:
        '200':
          description: Readiness payload
  /api/webhook-hub/capabilities:
    get:
      summary: Read outbound webhook capability posture
      responses:
        '200':
          description: Capability payload
  /api/webhook-hub/outbound-endpoints:
    get:
      summary: List tenant outbound endpoints
      responses:
        '200':
          description: Outbound endpoint list
    post:
      summary: Register one tenant outbound endpoint
      requestBody:
        required: true
      responses:
        '201':
          description: Outbound endpoint created
  /api/webhook-hub/outbound-endpoints/{publicId}:
    get:
      summary: Read one tenant outbound endpoint
      responses:
        '200':
          description: Outbound endpoint detail
  /api/webhook-hub/outbound-endpoints/{publicId}/deliveries:
    get:
      summary: List outbound delivery log for one endpoint
      responses:
        '200':
          description: Outbound delivery log
    post:
      summary: Register one outbound delivery attempt
      requestBody:
        required: true
      responses:
        '201':
          description: Outbound delivery created
  /api/webhook-hub/outbound-endpoints/{publicId}/deliveries/{deliveryPublicId}/dead-letter:
    post:
      summary: Move one outbound delivery to dead letter
      responses:
        '200':
          description: Outbound delivery dead-lettered
  /api/webhook-hub/events:
    get:
      summary: List inbound webhook events
      responses:
        '200':
          description: Event list
    post:
      summary: Register inbound webhook event
      requestBody:
        required: true
      responses:
        '201':
          description: Event received
  /api/webhook-hub/events/summary:
    get:
      summary: Aggregate inbound webhook state
      responses:
        '200':
          description: Event summary
  /api/webhook-hub/events/dead-letter:
    get:
      summary: List dead-lettered inbound webhook events
      responses:
        '200':
          description: Dead-letter event list
  /api/webhook-hub/events/{publicId}:
    get:
      summary: Read one inbound webhook event
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event detail
  /api/webhook-hub/events/{publicId}/transitions:
    get:
      summary: List state transitions for one event
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event transitions
  /api/webhook-hub/events/{publicId}/validate:
    post:
      summary: Validate inbound webhook event
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event validated
  /api/webhook-hub/events/{publicId}/queue:
    post:
      summary: Queue inbound webhook event for processing
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event queued
  /api/webhook-hub/events/{publicId}/process:
    post:
      summary: Mark inbound webhook event as processing
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event processing
  /api/webhook-hub/events/{publicId}/forward:
    post:
      summary: Mark inbound webhook event as forwarded
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event forwarded
  /api/webhook-hub/events/{publicId}/fail:
    post:
      summary: Record inbound webhook processing failure
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event failed
  /api/webhook-hub/events/{publicId}/dead-letter:
    post:
      summary: Move event to dead letter queue
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event dead-lettered
  /api/webhook-hub/events/{publicId}/requeue:
    post:
      summary: Requeue dead-letter event
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event requeued
  /api/webhook-hub/events/{publicId}/reject:
    post:
      summary: Reject inbound webhook event
      parameters:
        - in: path
          name: publicId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event rejected
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalServiceToken:
      type: http
      scheme: bearer
      bearerFormat: service-account-jwt
