openapi: 3.1.0
info:
  title: Business Operating System Platform Control API
  version: 0.2.0
  description: Tenant capabilities, entitlements, quotas, metering, lifecycle jobs and SaaS governance.
security:
  - bearerAuth: []
paths:
  /api/platform-control/capabilities/catalog:
    get:
      summary: List platform capability catalog
      responses:
        "200":
          description: Capability catalog
  /api/platform-control/providers/catalog:
    get:
      summary: List provider capability catalog and environment posture
      responses:
        "200":
          description: Provider catalog
  /api/platform-control/providers/activation/catalog:
    get:
      summary: List BYOK external provider activation catalog
      responses:
        "200":
          description: External provider activation catalog with credential posture and supported actions
  /api/platform-control/tenants/{tenantSlug}/providers/activation/runs:
    get:
      summary: List external provider activation runs for one tenant
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
        - in: query
          name: provider_key
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Provider activation audit run list
  /api/platform-control/tenants/{tenantSlug}/providers/activation/{provider_key}/test:
    post:
      summary: Execute a BYOK provider activation test or supported provider action
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
        - in: path
          name: provider_key
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  default: connection_test
                actor:
                  type: string
                payload:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Provider activation execution result, or unavailable when the credential is not configured
        "400":
          description: Unsupported provider action
        "404":
          description: Provider activation not found
  /api/platform-control/tenants/{tenantSlug}/entitlements:
    get:
      summary: List tenant entitlements with cursor pagination
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paginated entitlement list
  /api/platform-control/tenants/{tenantSlug}/feature-flags:
    get:
      summary: List tenant feature flags with capability metadata
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paginated feature flag list
  /api/platform-control/tenants/{tenantSlug}/entitlements/{capabilityKey}:
    put:
      summary: Upsert one entitlement
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
        - in: path
          name: capabilityKey
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upserted entitlement
  /api/platform-control/tenants/{tenantSlug}/feature-flags/{capabilityKey}:
    put:
      summary: Upsert one feature flag using entitlement governance
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
        - in: path
          name: capabilityKey
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upserted feature flag
  /api/platform-control/tenants/{tenantSlug}/entitlements/bulk:
    post:
      summary: Bulk upsert entitlements with partial success
      responses:
        "200":
          description: Bulk entitlement result
  /api/platform-control/tenants/{tenantSlug}/provider-defaults:
    get:
      summary: List provider defaults selected for one tenant
      responses:
        "200":
          description: Provider defaults
  /api/platform-control/tenants/{tenantSlug}/provider-defaults/{capabilityKey}:
    put:
      summary: Upsert provider default for one tenant capability
      responses:
        "200":
          description: Provider default
  /api/platform-control/tenants/{tenantSlug}/quotas:
    get:
      summary: List quotas by tenant
      responses:
        "200":
          description: Quota list
  /api/platform-control/tenants/{tenantSlug}/quotas/{metricKey}:
    put:
      summary: Upsert one quota
      responses:
        "200":
          description: Upserted quota
  /api/platform-control/tenants/{tenantSlug}/quotas/bulk:
    post:
      summary: Bulk upsert quotas with partial success
      responses:
        "200":
          description: Bulk quota result
  /api/platform-control/tenants/{tenantSlug}/blocks:
    get:
      summary: List tenant blocks
      responses:
        "200":
          description: Block list
  /api/platform-control/tenants/{tenantSlug}/blocks/{blockKey}:
    put:
      summary: Upsert tenant block
      responses:
        "200":
          description: Upserted tenant block
  /api/platform-control/tenants/{tenantSlug}/metering:
    get:
      summary: Read metering snapshots and summary with cursor pagination
      responses:
        "200":
          description: Metering summary
  /api/platform-control/tenants/{tenantSlug}/metering/snapshots:
    post:
      summary: Create one usage snapshot
      responses:
        "200":
          description: Created usage snapshot
  /api/platform-control/tenants/{tenantSlug}/usage-summary:
    get:
      summary: Read quota and metering utilization summary
      responses:
        "200":
          description: Usage summary
  /api/platform-control/tenants/{tenantSlug}/lifecycle/readiness:
    get:
      summary: Read tenant lifecycle readiness and provider posture
      responses:
        "200":
          description: Lifecycle readiness
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs:
    get:
      summary: List onboarding and offboarding jobs with cursor pagination
      responses:
        "200":
          description: Lifecycle jobs
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}:
    get:
      summary: Read one lifecycle job with audit events
      responses:
        "200":
          description: Lifecycle job detail
  /api/platform-control/tenants/{tenantSlug}/lifecycle/onboarding/preview:
    post:
      summary: Preview onboarding plan, provider defaults and lifecycle readiness
      responses:
        "200":
          description: Onboarding preview
  /api/platform-control/tenants/{tenantSlug}/lifecycle/onboarding:
    post:
      summary: Queue onboarding job with Idempotency-Key and 202 Accepted
      responses:
        "202":
          description: Queued onboarding job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/offboarding/preview:
    post:
      summary: Preview offboarding plan, retention posture and lifecycle readiness
      responses:
        "200":
          description: Offboarding preview
  /api/platform-control/tenants/{tenantSlug}/lifecycle/offboarding:
    post:
      summary: Queue offboarding job with Idempotency-Key and 202 Accepted
      responses:
        "202":
          description: Queued offboarding job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/start:
    post:
      summary: Transition lifecycle job to running
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/complete:
    post:
      summary: Transition lifecycle job to completed
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/fail:
    post:
      summary: Transition lifecycle job to failed
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/cancel:
    post:
      summary: Transition lifecycle job to cancelled
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/go-live/readiness:
    get:
      summary: Read go-live rollout readiness by tenant
      responses:
        "200":
          description: Go-live readiness
  /api/platform-control/tenants/{tenantSlug}/go-live/adoption:
    get:
      summary: Read tenant go-live adoption baseline and gap
      responses:
        "200":
          description: Go-live adoption summary
  /api/platform-control/tenants/{tenantSlug}/go-live/bottlenecks:
    get:
      summary: List go-live bottlenecks and operational blockers
      responses:
        "200":
          description: Go-live bottleneck list
  /api/platform-control/tenants/{tenantSlug}/go-live/playbook:
    get:
      summary: Read rollout and rollback playbook for one tenant
      responses:
        "200":
          description: Go-live playbook
  /api/platform-control/tenants/{tenantSlug}/go-live/adjustments:
    get:
      summary: List recommended go-live adjustments
      responses:
        "200":
          description: Go-live adjustments
  /api/platform-control/tenants/{tenantSlug}/go-live/adjustments/apply:
    post:
      summary: Apply one go-live operational adjustment
      responses:
        "200":
          description: Applied go-live adjustment
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts:
    get:
      summary: List go-live rollouts
      responses:
        "200":
          description: Go-live rollouts
    post:
      summary: Create one go-live rollout
      responses:
        "200":
          description: Created go-live rollout
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}:
    get:
      summary: Read one go-live rollout with events
      responses:
        "200":
          description: Go-live rollout detail
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}/start:
    post:
      summary: Transition go-live rollout to running
      responses:
        "200":
          description: Updated go-live rollout
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}/complete:
    post:
      summary: Transition go-live rollout to completed
      responses:
        "200":
          description: Updated go-live rollout
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}/rollback:
    post:
      summary: Roll back one go-live rollout
      responses:
        "200":
          description: Rolled back go-live rollout
  /api/platform-control/tenants/{tenantSlug}/incidents:
    get:
      summary: List operational incidents by tenant
      responses:
        "200":
          description: Incident list
    post:
      summary: Open one operational incident
      responses:
        "200":
          description: Created incident
  /api/platform-control/tenants/{tenantSlug}/incident-command/readiness:
    get:
      summary: Read incident command readiness
      responses:
        "200":
          description: Incident command readiness
  /api/platform-control/tenants/{tenantSlug}/incidents/{publicId}:
    get:
      summary: Read one incident with timeline, actions and postmortem
      responses:
        "200":
          description: Incident detail
  /api/platform-control/tenants/{tenantSlug}/incidents/{publicId}/timeline:
    post:
      summary: Append one incident timeline event
      responses:
        "200":
          description: Incident timeline event
  /api/platform-control/tenants/{tenantSlug}/incidents/{publicId}/actions:
    post:
      summary: Create one incident action item
      responses:
        "200":
          description: Incident action
  /api/platform-control/tenants/{tenantSlug}/incidents/{publicId}/resolve:
    post:
      summary: Resolve one incident
      responses:
        "200":
          description: Resolved incident
  /api/platform-control/tenants/{tenantSlug}/incidents/{publicId}/postmortem:
    post:
      summary: Create one incident postmortem
      responses:
        "200":
          description: Incident postmortem
  /api/platform-control/policies/catalog:
    get:
      summary: List policy catalog
      responses:
        "200":
          description: Policy catalog
  /api/platform-control/tenants/{tenantSlug}/policies/evaluate:
    post:
      summary: Evaluate one policy decision
      responses:
        "200":
          description: Policy decision
  /api/platform-control/tenants/{tenantSlug}/policies/decisions:
    get:
      summary: List policy decisions
      responses:
        "200":
          description: Policy decision list
  /api/platform-control/tenants/{tenantSlug}/timeline:
    get:
      summary: List operational timeline events
      responses:
        "200":
          description: Timeline event list
    post:
      summary: Record one operational timeline event
      responses:
        "200":
          description: Timeline event
  /api/platform-control/tenants/{tenantSlug}/approvals:
    get:
      summary: List command approvals
      responses:
        "200":
          description: Approval list
    post:
      summary: Create one command approval request
      responses:
        "200":
          description: Approval request
  /api/platform-control/tenants/{tenantSlug}/approvals/{publicId}/approve:
    post:
      summary: Approve one command approval request
      responses:
        "200":
          description: Approved request
  /api/platform-control/tenants/{tenantSlug}/approvals/{publicId}/reject:
    post:
      summary: Reject one command approval request
      responses:
        "200":
          description: Rejected request
  /api/platform-control/tenants/{tenantSlug}/approvals/{publicId}/execute:
    post:
      summary: Execute one approved command request
      responses:
        "200":
          description: Executed request
  /api/platform-control/runbooks/catalog:
    get:
      summary: List runbook catalog
      responses:
        "200":
          description: Runbook catalog
  /api/platform-control/tenants/{tenantSlug}/runbooks:
    get:
      summary: List runbook runs
      responses:
        "200":
          description: Runbook run list
    post:
      summary: Create one runbook run
      responses:
        "200":
          description: Runbook run
  /api/platform-control/tenants/{tenantSlug}/runbooks/{publicId}/start:
    post:
      summary: Start one approved runbook run
      responses:
        "200":
          description: Running runbook
  /api/platform-control/tenants/{tenantSlug}/runbooks/{publicId}/complete-step:
    post:
      summary: Complete current runbook step
      responses:
        "200":
          description: Updated runbook
  /api/platform-control/tenants/{tenantSlug}/runbooks/{publicId}/cancel:
    post:
      summary: Cancel one runbook run
      responses:
        "200":
          description: Cancelled runbook
  /api/platform-control/tenants/{tenantSlug}/evidence:
    get:
      summary: List audit evidence records
      responses:
        "200":
          description: Evidence record list
    post:
      summary: Register one audit evidence record
      responses:
        "200":
          description: Evidence record
  /api/platform-control/tenants/{tenantSlug}/evidence/{publicId}:
    get:
      summary: Read one audit evidence record
      responses:
        "200":
          description: Evidence detail
  /api/platform-control/tenants/{tenantSlug}/autonomous-governance/readiness:
    get:
      summary: Read governance readiness
      responses:
        "200":
          description: Governance readiness
  /api/platform-control/event-mesh/catalog:
    get:
      summary: List enterprise event mesh streams
      responses:
        "200":
          description: Event mesh catalog
  /api/platform-control/tenants/{tenantSlug}/event-mesh/events:
    get:
      summary: List tenant event mesh events
      responses:
        "200":
          description: Event mesh event list
    post:
      summary: Publish one tenant event mesh event
      responses:
        "200":
          description: Event mesh event
  /api/platform-control/tenants/{tenantSlug}/event-mesh/dead-letters:
    get:
      summary: List tenant event mesh dead letters
      responses:
        "200":
          description: Dead letter list
  /api/platform-control/tenants/{tenantSlug}/event-mesh/dead-letters/{publicId}/replay:
    post:
      summary: Replay one event mesh dead letter
      responses:
        "200":
          description: Replayed dead letter
  /api/platform-control/tenants/{tenantSlug}/event-mesh/lineage:
    get:
      summary: Read event mesh lineage
      responses:
        "200":
          description: Event mesh lineage
  /api/platform-control/tenants/{tenantSlug}/runtime/profile:
    get:
      summary: Read tenant runtime profile
      responses:
        "200":
          description: Runtime profile
    put:
      summary: Update tenant runtime profile
      responses:
        "200":
          description: Updated runtime profile
  /api/platform-control/tenants/{tenantSlug}/runtime/health-score:
    get:
      summary: Read tenant runtime health score
      responses:
        "200":
          description: Runtime health score
  /api/platform-control/tenants/{tenantSlug}/runtime/quotas:
    get:
      summary: List tenant runtime quotas
      responses:
        "200":
          description: Runtime quota list
  /api/platform-control/tenants/{tenantSlug}/runtime/quotas/{metricKey}:
    put:
      summary: Upsert one tenant runtime quota
      responses:
        "200":
          description: Runtime quota
  /api/platform-control/tenants/{tenantSlug}/runtime/maintenance-windows:
    get:
      summary: List tenant maintenance windows
      responses:
        "200":
          description: Maintenance window list
    post:
      summary: Schedule one tenant maintenance window
      responses:
        "200":
          description: Maintenance window
  /api/platform-control/contracts/evolution:
    get:
      summary: List contract evolution catalog
      responses:
        "200":
          description: Contract evolution catalog
  /api/platform-control/contracts/evolution/snapshots:
    post:
      summary: Create one contract snapshot
      responses:
        "200":
          description: Contract snapshot
  /api/platform-control/contracts/evolution/diffs:
    get:
      summary: List contract diffs
      responses:
        "200":
          description: Contract diff list
    post:
      summary: Create one contract diff
      responses:
        "200":
          description: Contract diff
  /api/platform-control/contracts/evolution/breaking-changes:
    get:
      summary: List contract breaking changes
      responses:
        "200":
          description: Breaking change list
  /api/platform-control/contracts/evolution/breaking-changes/{publicId}/approve:
    post:
      summary: Approve one contract breaking change
      responses:
        "200":
          description: Approved breaking change
  /api/platform-control/contracts/evolution/compatibility-matrix:
    get:
      summary: Read contract compatibility matrix
      responses:
        "200":
          description: Compatibility matrix
  /api/platform-control/tenants/{tenantSlug}/enterprise-runtime/readiness:
    get:
      summary: Read enterprise runtime readiness
      responses:
        "200":
          description: Enterprise runtime readiness
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalServiceToken:
      type: http
      scheme: bearer
      bearerFormat: service-account-jwt
