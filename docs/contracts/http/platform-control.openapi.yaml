openapi: 3.1.0
info:
  title: ERP Platform Control API
  version: 0.2.0
  description: Tenant capabilities, entitlements, quotas, metering, lifecycle jobs and SaaS governance.
security:
  - bearerAuth: []
paths:
  /api/platform-control/capabilities/catalog:
    get:
      summary: List platform capability catalog
      responses:
        "200":
          description: Capability catalog
  /api/platform-control/providers/catalog:
    get:
      summary: List provider capability catalog and environment posture
      responses:
        "200":
          description: Provider catalog
  /api/platform-control/tenants/{tenantSlug}/entitlements:
    get:
      summary: List tenant entitlements with cursor pagination
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paginated entitlement list
  /api/platform-control/tenants/{tenantSlug}/feature-flags:
    get:
      summary: List tenant feature flags with capability metadata
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paginated feature flag list
  /api/platform-control/tenants/{tenantSlug}/entitlements/{capabilityKey}:
    put:
      summary: Upsert one entitlement
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
        - in: path
          name: capabilityKey
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upserted entitlement
  /api/platform-control/tenants/{tenantSlug}/feature-flags/{capabilityKey}:
    put:
      summary: Upsert one feature flag using entitlement governance
      parameters:
        - in: path
          name: tenantSlug
          required: true
          schema:
            type: string
        - in: path
          name: capabilityKey
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upserted feature flag
  /api/platform-control/tenants/{tenantSlug}/entitlements/bulk:
    post:
      summary: Bulk upsert entitlements with partial success
      responses:
        "200":
          description: Bulk entitlement result
  /api/platform-control/tenants/{tenantSlug}/provider-defaults:
    get:
      summary: List provider defaults selected for one tenant
      responses:
        "200":
          description: Provider defaults
  /api/platform-control/tenants/{tenantSlug}/provider-defaults/{capabilityKey}:
    put:
      summary: Upsert provider default for one tenant capability
      responses:
        "200":
          description: Provider default
  /api/platform-control/tenants/{tenantSlug}/quotas:
    get:
      summary: List quotas by tenant
      responses:
        "200":
          description: Quota list
  /api/platform-control/tenants/{tenantSlug}/quotas/{metricKey}:
    put:
      summary: Upsert one quota
      responses:
        "200":
          description: Upserted quota
  /api/platform-control/tenants/{tenantSlug}/quotas/bulk:
    post:
      summary: Bulk upsert quotas with partial success
      responses:
        "200":
          description: Bulk quota result
  /api/platform-control/tenants/{tenantSlug}/blocks:
    get:
      summary: List tenant blocks
      responses:
        "200":
          description: Block list
  /api/platform-control/tenants/{tenantSlug}/blocks/{blockKey}:
    put:
      summary: Upsert tenant block
      responses:
        "200":
          description: Upserted tenant block
  /api/platform-control/tenants/{tenantSlug}/metering:
    get:
      summary: Read metering snapshots and summary with cursor pagination
      responses:
        "200":
          description: Metering summary
  /api/platform-control/tenants/{tenantSlug}/metering/snapshots:
    post:
      summary: Create one usage snapshot
      responses:
        "200":
          description: Created usage snapshot
  /api/platform-control/tenants/{tenantSlug}/usage-summary:
    get:
      summary: Read quota and metering utilization summary
      responses:
        "200":
          description: Usage summary
  /api/platform-control/tenants/{tenantSlug}/lifecycle/readiness:
    get:
      summary: Read tenant lifecycle readiness and provider posture
      responses:
        "200":
          description: Lifecycle readiness
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs:
    get:
      summary: List onboarding and offboarding jobs with cursor pagination
      responses:
        "200":
          description: Lifecycle jobs
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}:
    get:
      summary: Read one lifecycle job with audit events
      responses:
        "200":
          description: Lifecycle job detail
  /api/platform-control/tenants/{tenantSlug}/lifecycle/onboarding/preview:
    post:
      summary: Preview onboarding plan, provider defaults and lifecycle readiness
      responses:
        "200":
          description: Onboarding preview
  /api/platform-control/tenants/{tenantSlug}/lifecycle/onboarding:
    post:
      summary: Queue onboarding job with Idempotency-Key and 202 Accepted
      responses:
        "202":
          description: Queued onboarding job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/offboarding/preview:
    post:
      summary: Preview offboarding plan, retention posture and lifecycle readiness
      responses:
        "200":
          description: Offboarding preview
  /api/platform-control/tenants/{tenantSlug}/lifecycle/offboarding:
    post:
      summary: Queue offboarding job with Idempotency-Key and 202 Accepted
      responses:
        "202":
          description: Queued offboarding job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/start:
    post:
      summary: Transition lifecycle job to running
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/complete:
    post:
      summary: Transition lifecycle job to completed
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/fail:
    post:
      summary: Transition lifecycle job to failed
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/lifecycle/jobs/{publicId}/cancel:
    post:
      summary: Transition lifecycle job to cancelled
      responses:
        "200":
          description: Updated lifecycle job
  /api/platform-control/tenants/{tenantSlug}/go-live/readiness:
    get:
      summary: Read go-live rollout readiness by tenant
      responses:
        "200":
          description: Go-live readiness
  /api/platform-control/tenants/{tenantSlug}/go-live/adoption:
    get:
      summary: Read tenant go-live adoption baseline and gap
      responses:
        "200":
          description: Go-live adoption summary
  /api/platform-control/tenants/{tenantSlug}/go-live/bottlenecks:
    get:
      summary: List go-live bottlenecks and operational blockers
      responses:
        "200":
          description: Go-live bottleneck list
  /api/platform-control/tenants/{tenantSlug}/go-live/playbook:
    get:
      summary: Read rollout and rollback playbook for one tenant
      responses:
        "200":
          description: Go-live playbook
  /api/platform-control/tenants/{tenantSlug}/go-live/adjustments:
    get:
      summary: List recommended go-live adjustments
      responses:
        "200":
          description: Go-live adjustments
  /api/platform-control/tenants/{tenantSlug}/go-live/adjustments/apply:
    post:
      summary: Apply one go-live operational adjustment
      responses:
        "200":
          description: Applied go-live adjustment
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts:
    get:
      summary: List go-live rollouts
      responses:
        "200":
          description: Go-live rollouts
    post:
      summary: Create one go-live rollout
      responses:
        "200":
          description: Created go-live rollout
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}:
    get:
      summary: Read one go-live rollout with events
      responses:
        "200":
          description: Go-live rollout detail
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}/start:
    post:
      summary: Transition go-live rollout to running
      responses:
        "200":
          description: Updated go-live rollout
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}/complete:
    post:
      summary: Transition go-live rollout to completed
      responses:
        "200":
          description: Updated go-live rollout
  /api/platform-control/tenants/{tenantSlug}/go-live/rollouts/{publicId}/rollback:
    post:
      summary: Roll back one go-live rollout
      responses:
        "200":
          description: Rolled back go-live rollout
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalServiceToken:
      type: http
      scheme: bearer
      bearerFormat: service-account-jwt
