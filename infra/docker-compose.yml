    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      FINANCE_BOOTSTRAP_TENANT_SLUG: "${FINANCE_BOOTSTRAP_TENANT_SLUG}"
      FINANCE_POSTGRES_HOST: "service-postgresql"
      FINANCE_POSTGRES_PORT: "5432"
      FINANCE_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      FINANCE_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      FINANCE_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      FINANCE_POSTGRES_SSL_MODE: "Disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
    ports:
      - "${FINANCE_HTTP_PORT}:8089"

  billing:
    build:
      context: ../service-api/service-csharp/billing
    container_name: erp-billing
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      BILLING_BOOTSTRAP_TENANT_SLUG: "${BILLING_BOOTSTRAP_TENANT_SLUG}"
      BILLING_POSTGRES_HOST: "service-postgresql"
      BILLING_POSTGRES_PORT: "5432"
      BILLING_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      BILLING_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      BILLING_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      BILLING_POSTGRES_SSL_MODE: "Disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
    ports:
      - "${BILLING_HTTP_PORT}:8095"

  documents:
    build:
      context: ../service-api/service-golang/documents
    container_name: erp-documents
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      DOCUMENTS_HTTP_ADDRESS: ":8086"
      DOCUMENTS_REPOSITORY_DRIVER: "postgres"
      DOCUMENTS_BOOTSTRAP_TENANT_SLUG: "${DOCUMENTS_BOOTSTRAP_TENANT_SLUG}"
      DOCUMENTS_POSTGRES_HOST: "service-postgresql"
      DOCUMENTS_POSTGRES_PORT: "5432"
      DOCUMENTS_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      DOCUMENTS_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      DOCUMENTS_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      DOCUMENTS_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
    ports:
      - "${DOCUMENTS_HTTP_PORT}:8086"

  rentals:
    build:
      context: ../service-api/service-golang/rentals
    container_name: erp-rentals
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      RENTALS_HTTP_ADDRESS: ":8096"
      RENTALS_REPOSITORY_DRIVER: "postgres"
      RENTALS_BOOTSTRAP_TENANT_SLUG: "${RENTALS_BOOTSTRAP_TENANT_SLUG}"
      RENTALS_DOCUMENTS_BASE_URL: "${RENTALS_DOCUMENTS_BASE_URL}"
      RENTALS_POSTGRES_HOST: "service-postgresql"
      RENTALS_POSTGRES_PORT: "5432"
      RENTALS_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      RENTALS_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      RENTALS_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      RENTALS_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      documents:
        condition: service_started
    ports:
      - "${RENTALS_HTTP_PORT}:8096"

  workflow-control:
    build:
      context: ../service-api/service-typescript/workflow-control
    container_name: erp-workflow-control
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      WORKFLOW_CONTROL_HTTP_HOST: "0.0.0.0"
      WORKFLOW_CONTROL_HTTP_PORT: "8084"
      WORKFLOW_CONTROL_REPOSITORY_DRIVER: "postgres"
      WORKFLOW_CONTROL_BOOTSTRAP_TENANT_SLUG: "${WORKFLOW_CONTROL_BOOTSTRAP_TENANT_SLUG}"
      WORKFLOW_CONTROL_POSTGRES_HOST: "service-postgresql"
      WORKFLOW_CONTROL_POSTGRES_PORT: "5432"
      WORKFLOW_CONTROL_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      WORKFLOW_CONTROL_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      WORKFLOW_CONTROL_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      WORKFLOW_CONTROL_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${WORKFLOW_CONTROL_HTTP_PORT}:8084"

  engagement:
    build:
      context: ../service-api/service-typescript/engagement
    container_name: erp-engagement
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      ENGAGEMENT_HTTP_HOST: "0.0.0.0"
      ENGAGEMENT_HTTP_PORT: "8088"
      ENGAGEMENT_REPOSITORY_DRIVER: "postgres"
      ENGAGEMENT_BOOTSTRAP_TENANT_SLUG: "${ENGAGEMENT_BOOTSTRAP_TENANT_SLUG}"
      ENGAGEMENT_CRM_BASE_URL: "${ENGAGEMENT_CRM_BASE_URL}"
      ENGAGEMENT_RESEND_API_KEY: "${ENGAGEMENT_RESEND_API_KEY}"
      ENGAGEMENT_WHATSAPP_ACCESS_TOKEN: "${ENGAGEMENT_WHATSAPP_ACCESS_TOKEN}"
      ENGAGEMENT_TELEGRAM_BOT_TOKEN: "${ENGAGEMENT_TELEGRAM_BOT_TOKEN}"
      ENGAGEMENT_META_ADS_ACCESS_TOKEN: "${ENGAGEMENT_META_ADS_ACCESS_TOKEN}"
      ENGAGEMENT_POSTGRES_HOST: "service-postgresql"
      ENGAGEMENT_POSTGRES_PORT: "5432"
      ENGAGEMENT_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      ENGAGEMENT_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      ENGAGEMENT_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      ENGAGEMENT_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
      crm:
        condition: service_started
    ports:
      - "${ENGAGEMENT_HTTP_PORT}:8088"

  workflow-runtime:
    build:
      context: ../service-api/service-elixir/workflow-runtime
    container_name: erp-workflow-runtime
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      WORKFLOW_RUNTIME_HTTP_HOST: "0.0.0.0"
      WORKFLOW_RUNTIME_HTTP_PORT: "8085"
      WORKFLOW_RUNTIME_BOOTSTRAP_TENANT_SLUG: "${WORKFLOW_RUNTIME_BOOTSTRAP_TENANT_SLUG}"
      WORKFLOW_RUNTIME_REPOSITORY_DRIVER: "postgres"
      WORKFLOW_RUNTIME_POSTGRES_HOST: "service-postgresql"
      WORKFLOW_RUNTIME_POSTGRES_PORT: "5432"
      WORKFLOW_RUNTIME_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      WORKFLOW_RUNTIME_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      WORKFLOW_RUNTIME_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      WORKFLOW_RUNTIME_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${WORKFLOW_RUNTIME_HTTP_PORT}:8085"

  analytics:
    build:
      context: ../service-api/service-python/analytics
    container_name: erp-analytics
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      ANALYTICS_HTTP_HOST: "0.0.0.0"
      ANALYTICS_HTTP_PORT: "8086"
      ANALYTICS_REPOSITORY_DRIVER: "postgres"
      ANALYTICS_POSTGRES_HOST: "service-postgresql"
      ANALYTICS_POSTGRES_PORT: "5432"
      ANALYTICS_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      ANALYTICS_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      ANALYTICS_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      ANALYTICS_POSTGRES_SSL_MODE: "disable"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL}"
      CRM_CNPJ_PROVIDER_TOKEN: "${CRM_CNPJ_PROVIDER_TOKEN}"
      CRM_CONECTA_CNPJ_API_KEY: "${CRM_CONECTA_CNPJ_API_KEY}"
      CRM_SERPRO_CLIENT_ID: "${CRM_SERPRO_CLIENT_ID}"
      CRM_SERPRO_CLIENT_SECRET: "${CRM_SERPRO_CLIENT_SECRET}"
      CRM_BRASILAPI_TOKEN: "${CRM_BRASILAPI_TOKEN}"
      CRM_VIACEP_TOKEN: "${CRM_VIACEP_TOKEN}"
      BILLING_ASAAS_API_KEY: "${BILLING_ASAAS_API_KEY}"
      BILLING_STRIPE_SECRET_KEY: "${BILLING_STRIPE_SECRET_KEY}"
      BILLING_MERCADO_PAGO_ACCESS_TOKEN: "${BILLING_MERCADO_PAGO_ACCESS_TOKEN}"
      DOCUMENTS_STORAGE_DRIVER: "${DOCUMENTS_STORAGE_DRIVER}"
      DOCUMENTS_STORAGE_BUCKET: "${DOCUMENTS_STORAGE_BUCKET}"
      DOCUMENTS_STORAGE_ENDPOINT: "${DOCUMENTS_STORAGE_ENDPOINT}"
      DOCUMENTS_R2_ACCOUNT_ID: "${DOCUMENTS_R2_ACCOUNT_ID}"
      DOCUMENTS_R2_BUCKET: "${DOCUMENTS_R2_BUCKET}"
      DOCUMENTS_CLICKSIGN_API_KEY: "${DOCUMENTS_CLICKSIGN_API_KEY}"
      DOCUMENTS_DOCUSIGN_ACCESS_TOKEN: "${DOCUMENTS_DOCUSIGN_ACCESS_TOKEN}"
      AWS_TEXTRACT_ACCESS_KEY_ID: "${AWS_TEXTRACT_ACCESS_KEY_ID}"
      AWS_TEXTRACT_SECRET_ACCESS_KEY: "${AWS_TEXTRACT_SECRET_ACCESS_KEY}"
      AWS_TEXTRACT_REGION: "${AWS_TEXTRACT_REGION}"
      GOOGLE_DOCUMENT_AI_PROCESSOR: "${GOOGLE_DOCUMENT_AI_PROCESSOR}"
      GOOGLE_DOCUMENT_AI_CREDENTIALS_JSON: "${GOOGLE_DOCUMENT_AI_CREDENTIALS_JSON}"
      FISCAL_FOCUS_NFE_API_KEY: "${FISCAL_FOCUS_NFE_API_KEY}"
      FISCAL_ENOTAS_API_KEY: "${FISCAL_ENOTAS_API_KEY}"
      FISCAL_CERTIFICATE_PROVIDER: "${FISCAL_CERTIFICATE_PROVIDER}"
      FISCAL_CERTIFICATE_A1_SECRET: "${FISCAL_CERTIFICATE_A1_SECRET}"
      FISCAL_CERTIFICATE_A3_PROVIDER: "${FISCAL_CERTIFICATE_A3_PROVIDER}"
      MARKET_ALPHA_VANTAGE_API_KEY: "${MARKET_ALPHA_VANTAGE_API_KEY}"
      MARKET_FIXER_API_KEY: "${MARKET_FIXER_API_KEY}"
      NEWSAPI_KEY: "${NEWSAPI_KEY}"
      GDELT_BASE_URL: "${GDELT_BASE_URL}"
      WEBHOOK_HUB_OUTBOUND_SIGNING_SECRET: "${WEBHOOK_HUB_OUTBOUND_SIGNING_SECRET}"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${ANALYTICS_HTTP_PORT}:8086"

  simulation:
    build:
      context: ../service-api/service-python/simulation
    container_name: erp-simulation
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      SIMULATION_HTTP_HOST: "0.0.0.0"
      SIMULATION_HTTP_PORT: "8094"
      SIMULATION_REPOSITORY_DRIVER: "postgres"
      SIMULATION_POSTGRES_HOST: "service-postgresql"
      SIMULATION_POSTGRES_PORT: "5432"
      SIMULATION_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      SIMULATION_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      SIMULATION_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      SIMULATION_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${SIMULATION_HTTP_PORT}:8094"

  catalog:
    build:
      context: ../service-api/service-python/catalog
    container_name: erp-catalog
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      CATALOG_HTTP_PORT: "8097"
      CATALOG_REPOSITORY_DRIVER: "postgres"
      CATALOG_BOOTSTRAP_TENANT_SLUG: "${CATALOG_BOOTSTRAP_TENANT_SLUG}"
      CATALOG_POSTGRES_HOST: "service-postgresql"
      CATALOG_POSTGRES_PORT: "5432"
      ERP_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      ERP_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      ERP_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      CATALOG_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
