services:
  service-postgresql:
    image: postgres:16-alpine
    container_name: erp-postgresql
    environment:
      POSTGRES_DB: ${ERP_POSTGRES_DB}
      POSTGRES_USER: ${ERP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ERP_POSTGRES_PASSWORD}
      TZ: ${ERP_TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - erp-postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  service-redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "${REDIS_PORT}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - erp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  service-kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: erp-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@service-kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://service-kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "${KAFKA_PORT}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  service-keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: erp-keycloak
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN_USER}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/${KEYCLOAK_REALM} HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"200 OK\"'",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  service-openfga-migrate:
    image: openfga/openfga:latest
    container_name: erp-openfga-migrate
    user: nonroot
    command:
      - migrate
      - --datastore-engine
      - sqlite
      - --datastore-uri
      - file:/home/nonroot/openfga.db
    volumes:
      - erp-openfga-data:/home/nonroot

  service-openfga:
    image: openfga/openfga:latest
    container_name: erp-openfga
    user: nonroot
    command:
      - run
      - --datastore-engine
      - sqlite
      - --datastore-uri
      - file:/home/nonroot/openfga.db
      - --playground-enabled=true
      - --playground-port=3000
    depends_on:
      service-openfga-migrate:
        condition: service_completed_successfully
    volumes:
      - erp-openfga-data:/home/nonroot
    ports:
      - "${OPENFGA_HTTP_PORT}:8080"
      - "${OPENFGA_GRPC_PORT}:8081"
      - "${OPENFGA_PLAYGROUND_PORT}:3000"

  service-blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: erp-blackbox-exporter
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  service-prometheus:
    image: prom/prometheus:v2.53.1
    container_name: erp-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      service-blackbox-exporter:
        condition: service_started
    ports:
      - "${PROMETHEUS_PORT}:9090"

  service-grafana:
    image: grafana/grafana:11.1.0
    container_name: erp-grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${KEYCLOAK_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      service-prometheus:
        condition: service_started
    ports:
      - "${GRAFANA_PORT}:3000"

  edge:
    build:
      context: ../service-api/service-golang/edge
    container_name: erp-edge
    environment:
      EDGE_HTTP_ADDRESS: ":8080"
      EDGE_DOWNSTREAM_TIMEOUT: "${EDGE_DOWNSTREAM_TIMEOUT}"
      EDGE_IDENTITY_BASE_URL: "${EDGE_IDENTITY_BASE_URL}"
      EDGE_CRM_BASE_URL: "${EDGE_CRM_BASE_URL}"
      EDGE_WORKFLOW_CONTROL_BASE_URL: "${EDGE_WORKFLOW_CONTROL_BASE_URL}"
      EDGE_WORKFLOW_RUNTIME_BASE_URL: "${EDGE_WORKFLOW_RUNTIME_BASE_URL}"
      EDGE_ANALYTICS_BASE_URL: "${EDGE_ANALYTICS_BASE_URL}"
      EDGE_WEBHOOK_HUB_BASE_URL: "${EDGE_WEBHOOK_HUB_BASE_URL}"
      EDGE_SALES_BASE_URL: "${EDGE_SALES_BASE_URL}"
      EDGE_ENGAGEMENT_BASE_URL: "${EDGE_ENGAGEMENT_BASE_URL}"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
      service-kafka:
        condition: service_healthy
    ports:
      - "${EDGE_HTTP_PORT}:8080"

  crm:
    build:
      context: ../service-api/service-golang/crm
    container_name: erp-crm
    environment:
      CRM_HTTP_ADDRESS: ":8083"
      CRM_REPOSITORY_DRIVER: "postgres"
      CRM_BOOTSTRAP_TENANT_SLUG: "bootstrap-ops"
      CRM_POSTGRES_HOST: "service-postgresql"
      CRM_POSTGRES_PORT: "5432"
      CRM_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      CRM_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      CRM_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      CRM_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
    ports:
      - "${CRM_HTTP_PORT}:8083"

  sales:
    build:
      context: ../service-api/service-golang/sales
    container_name: erp-sales
    environment:
      SALES_HTTP_ADDRESS: ":8087"
      SALES_REPOSITORY_DRIVER: "postgres"
      SALES_BOOTSTRAP_TENANT_SLUG: "bootstrap-ops"
      SALES_POSTGRES_HOST: "service-postgresql"
      SALES_POSTGRES_PORT: "5432"
      SALES_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      SALES_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      SALES_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      SALES_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
    ports:
      - "${SALES_HTTP_PORT}:8087"

  workflow-control:
    build:
      context: ../service-api/service-typescript/workflow-control
    container_name: erp-workflow-control
    environment:
      WORKFLOW_CONTROL_HTTP_HOST: "0.0.0.0"
      WORKFLOW_CONTROL_HTTP_PORT: "8084"
      WORKFLOW_CONTROL_REPOSITORY_DRIVER: "postgres"
      WORKFLOW_CONTROL_BOOTSTRAP_TENANT_SLUG: "${WORKFLOW_CONTROL_BOOTSTRAP_TENANT_SLUG}"
      WORKFLOW_CONTROL_POSTGRES_HOST: "service-postgresql"
      WORKFLOW_CONTROL_POSTGRES_PORT: "5432"
      WORKFLOW_CONTROL_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      WORKFLOW_CONTROL_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      WORKFLOW_CONTROL_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      WORKFLOW_CONTROL_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${WORKFLOW_CONTROL_HTTP_PORT}:8084"

  engagement:
    build:
      context: ../service-api/service-typescript/engagement
    container_name: erp-engagement
    environment:
      ENGAGEMENT_HTTP_HOST: "0.0.0.0"
      ENGAGEMENT_HTTP_PORT: "8088"
      ENGAGEMENT_REPOSITORY_DRIVER: "postgres"
      ENGAGEMENT_BOOTSTRAP_TENANT_SLUG: "${ENGAGEMENT_BOOTSTRAP_TENANT_SLUG}"
      ENGAGEMENT_POSTGRES_HOST: "service-postgresql"
      ENGAGEMENT_POSTGRES_PORT: "5432"
      ENGAGEMENT_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      ENGAGEMENT_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      ENGAGEMENT_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      ENGAGEMENT_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${ENGAGEMENT_HTTP_PORT}:8088"

  workflow-runtime:
    build:
      context: ../service-api/service-elixir/workflow-runtime
    container_name: erp-workflow-runtime
    environment:
      WORKFLOW_RUNTIME_HTTP_HOST: "0.0.0.0"
      WORKFLOW_RUNTIME_HTTP_PORT: "8085"
      WORKFLOW_RUNTIME_BOOTSTRAP_TENANT_SLUG: "${WORKFLOW_RUNTIME_BOOTSTRAP_TENANT_SLUG}"
      WORKFLOW_RUNTIME_REPOSITORY_DRIVER: "postgres"
      WORKFLOW_RUNTIME_POSTGRES_HOST: "service-postgresql"
      WORKFLOW_RUNTIME_POSTGRES_PORT: "5432"
      WORKFLOW_RUNTIME_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      WORKFLOW_RUNTIME_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      WORKFLOW_RUNTIME_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      WORKFLOW_RUNTIME_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${WORKFLOW_RUNTIME_HTTP_PORT}:8085"

  analytics:
    build:
      context: ../service-api/service-python/analytics
    container_name: erp-analytics
    environment:
      ANALYTICS_HTTP_HOST: "0.0.0.0"
      ANALYTICS_HTTP_PORT: "8086"
      ANALYTICS_REPOSITORY_DRIVER: "postgres"
      ANALYTICS_POSTGRES_HOST: "service-postgresql"
      ANALYTICS_POSTGRES_PORT: "5432"
      ANALYTICS_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      ANALYTICS_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      ANALYTICS_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      ANALYTICS_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
    ports:
      - "${ANALYTICS_HTTP_PORT}:8086"

  identity:
    build:
      context: ../service-api/service-csharp/identity
    container_name: erp-identity
    environment:
      IDENTITY_REPOSITORY_DRIVER: "postgres"
      IDENTITY_POSTGRES_HOST: "service-postgresql"
      IDENTITY_POSTGRES_PORT: "5432"
      IDENTITY_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      IDENTITY_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      IDENTITY_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      IDENTITY_POSTGRES_SSL_MODE: "Disable"
      IDENTITY_PROVIDER_DRIVER: "${IDENTITY_PROVIDER_DRIVER}"
      IDENTITY_AUTHORIZATION_DRIVER: "${IDENTITY_AUTHORIZATION_DRIVER}"
      IDENTITY_BOOTSTRAP_PASSWORD: "${IDENTITY_BOOTSTRAP_PASSWORD}"
      IDENTITY_MFA_ISSUER: "${IDENTITY_MFA_ISSUER}"
      KEYCLOAK_BASE_URL: "${KEYCLOAK_BASE_URL}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
      KEYCLOAK_IDENTITY_CLIENT_ID: "${KEYCLOAK_IDENTITY_CLIENT_ID}"
      KEYCLOAK_ADMIN_USER: "${KEYCLOAK_ADMIN_USER}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      OPENFGA_BASE_URL: "${OPENFGA_BASE_URL}"
      OPENFGA_STORE_NAME: "${OPENFGA_STORE_NAME}"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-keycloak:
        condition: service_healthy
      service-openfga:
        condition: service_started
    ports:
      - "${IDENTITY_HTTP_PORT}:8080"

  webhook-hub:
    build:
      context: ../service-api/service-rust/webhook-hub
    container_name: erp-webhook-hub
    environment:
      WEBHOOK_HUB_HTTP_ADDRESS: "0.0.0.0:8082"
      WEBHOOK_HUB_REPOSITORY_DRIVER: "postgres"
      WEBHOOK_HUB_POSTGRES_HOST: "service-postgresql"
      WEBHOOK_HUB_POSTGRES_PORT: "5432"
      WEBHOOK_HUB_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      WEBHOOK_HUB_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      WEBHOOK_HUB_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      WEBHOOK_HUB_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
      service-kafka:
        condition: service_healthy
    ports:
      - "${WEBHOOK_HUB_HTTP_PORT}:8082"

volumes:
  erp-postgresql-data:
  erp-redis-data:
  erp-openfga-data:
