x-erp-security-env: &erp-security-env
  ERP_ENV: "${ERP_ENV}"
  ERP_AUTH_ENFORCEMENT: "${ERP_AUTH_ENFORCEMENT}"
  ERP_JWT_HS256_SECRET: "${ERP_JWT_HS256_SECRET}"
  ERP_JWT_AUDIENCE: "${ERP_JWT_AUDIENCE}"
  ERP_INTERNAL_SERVICE_TOKEN: "${ERP_INTERNAL_SERVICE_TOKEN}"
  ERP_OPENFGA_ENFORCEMENT: "${ERP_OPENFGA_ENFORCEMENT}"
  OPENFGA_BASE_URL: "${OPENFGA_BASE_URL}"
  OPENFGA_STORE_ID: "${OPENFGA_STORE_ID}"
  OPENFGA_AUTHORIZATION_MODEL_ID: "${OPENFGA_AUTHORIZATION_MODEL_ID}"

x-erp-container-hardening: &erp-container-hardening
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 512

services:
  service-postgresql:
    image: postgres:16-alpine
    container_name: erp-postgresql
    environment:
      <<: *erp-security-env
      POSTGRES_DB: ${ERP_POSTGRES_DB}
      POSTGRES_USER: ${ERP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ERP_POSTGRES_PASSWORD}
      TZ: ${ERP_TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - erp-postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  service-redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "${REDIS_PORT}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - erp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  service-kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: erp-kafka
    environment:
      <<: *erp-security-env
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@service-kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://service-kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "${KAFKA_PORT}:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  service-keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: erp-keycloak
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
    environment:
      <<: *erp-security-env
      KEYCLOAK_ADMIN: "${KEYCLOAK_ADMIN_USER}"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/${KEYCLOAK_REALM} HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"200 OK\"'",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  service-openfga-migrate:
    image: openfga/openfga:v1.15.1
    container_name: erp-openfga-migrate
    user: nonroot
    command:
      - migrate
      - --datastore-engine
      - sqlite
      - --datastore-uri
      - file:/home/nonroot/openfga.db
    volumes:
      - erp-openfga-data:/home/nonroot

  service-openfga:
    image: openfga/openfga:v1.15.1
    container_name: erp-openfga
    user: nonroot
    command:
      - run
      - --datastore-engine
      - sqlite
      - --datastore-uri
      - file:/home/nonroot/openfga.db
      - --playground-enabled=true
      - --playground-port=3000
    depends_on:
      service-openfga-migrate:
        condition: service_completed_successfully
    volumes:
      - erp-openfga-data:/home/nonroot
    ports:
      - "${OPENFGA_HTTP_PORT}:8080"
      - "${OPENFGA_GRPC_PORT}:8081"
      - "${OPENFGA_PLAYGROUND_PORT}:3000"

  service-blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: erp-blackbox-exporter
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  service-prometheus:
    image: prom/prometheus:v2.53.1
    container_name: erp-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      service-blackbox-exporter:
        condition: service_started
    ports:
      - "${PROMETHEUS_PORT}:9090"

  service-grafana:
    image: grafana/grafana:11.1.0
    container_name: erp-grafana
    environment:
      <<: *erp-security-env
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      service-prometheus:
        condition: service_started
    ports:
      - "${GRAFANA_PORT}:3000"

  edge:
    build:
      context: ../service-api/service-golang/edge
    container_name: erp-edge
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      EDGE_HTTP_ADDRESS: ":8080"
      EDGE_DOWNSTREAM_TIMEOUT: "${EDGE_DOWNSTREAM_TIMEOUT}"
      EDGE_IDENTITY_BASE_URL: "${EDGE_IDENTITY_BASE_URL}"
      EDGE_CRM_BASE_URL: "${EDGE_CRM_BASE_URL}"
      EDGE_WORKFLOW_CONTROL_BASE_URL: "${EDGE_WORKFLOW_CONTROL_BASE_URL}"
      EDGE_WORKFLOW_RUNTIME_BASE_URL: "${EDGE_WORKFLOW_RUNTIME_BASE_URL}"
      EDGE_ANALYTICS_BASE_URL: "${EDGE_ANALYTICS_BASE_URL}"
      EDGE_WEBHOOK_HUB_BASE_URL: "${EDGE_WEBHOOK_HUB_BASE_URL}"
      EDGE_SALES_BASE_URL: "${EDGE_SALES_BASE_URL}"
      EDGE_ENGAGEMENT_BASE_URL: "${EDGE_ENGAGEMENT_BASE_URL}"
    depends_on:
      service-postgresql:
        condition: service_healthy
      service-redis:
        condition: service_healthy
      service-kafka:
        condition: service_healthy
    ports:
      - "${EDGE_HTTP_PORT}:8080"

  gateway:
    image: nginx:1.27-alpine
    container_name: erp-gateway
    <<: *erp-container-hardening
    depends_on:
      edge:
        condition: service_started
      identity:
        condition: service_started
      crm:
        condition: service_started
      sales:
        condition: service_started
      finance:
        condition: service_started
      billing:
        condition: service_started
      documents:
        condition: service_started
      rentals:
        condition: service_started
      workflow-control:
        condition: service_started
      workflow-runtime:
        condition: service_started
      analytics:
        condition: service_started
      simulation:
        condition: service_started
      catalog:
        condition: service_started
      platform-control:
        condition: service_started
      search:
        condition: service_started
      ai-governance:
        condition: service_started
      support:
        condition: service_started
      supplier:
        condition: service_started
      notification:
        condition: service_started
      fiscal:
        condition: service_started
      engagement:
        condition: service_started
      webhook-hub:
        condition: service_started
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${GATEWAY_HTTP_PORT}:8080"

  crm:
    build:
      context: ../service-api/service-golang/crm
    container_name: erp-crm
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      CRM_HTTP_ADDRESS: ":8083"
      CRM_REPOSITORY_DRIVER: "postgres"
      CRM_BOOTSTRAP_TENANT_SLUG: "bootstrap-ops"
      CRM_DOCUMENTS_BASE_URL: "${CRM_DOCUMENTS_BASE_URL}"
      CRM_POSTGRES_HOST: "service-postgresql"
      CRM_POSTGRES_PORT: "5432"
      CRM_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      CRM_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      CRM_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      CRM_POSTGRES_SSL_MODE: "disable"
    depends_on:
      service-postgresql:
        condition: service_healthy
      documents:
        condition: service_started
    ports:
      - "${CRM_HTTP_PORT}:8083"

  sales:
    build:
      context: ../service-api/service-golang/sales
    container_name: erp-sales
    <<: *erp-container-hardening
    environment:
      <<: *erp-security-env
      SALES_HTTP_ADDRESS: ":8087"
      SALES_REPOSITORY_DRIVER: "postgres"
      SALES_BOOTSTRAP_TENANT_SLUG: "bootstrap-ops"
      SALES_POSTGRES_HOST: "service-postgresql"
      SALES_POSTGRES_PORT: "5432"
      SALES_POSTGRES_DB: "${ERP_POSTGRES_DB}"
      SALES_POSTGRES_USER: "${ERP_POSTGRES_USER}"
      SALES_POSTGRES_PASSWORD: "${ERP_POSTGRES_PASSWORD}"
      SALES_POSTGRES_SSL_MODE: "disable"
    depends_on:
