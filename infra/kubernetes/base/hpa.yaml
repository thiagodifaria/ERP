apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: erp-edge
  labels:
    app.kubernetes.io/name: erp-edge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: erp-edge
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
