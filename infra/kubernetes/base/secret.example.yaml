apiVersion: v1
kind: Secret
metadata:
  name: erp-runtime-secrets
  labels:
    app.kubernetes.io/name: erp
type: Opaque
stringData:
  ERP_POSTGRES_HOST: "service-postgresql"
  ERP_POSTGRES_PORT: "5432"
  ERP_POSTGRES_DB: "erp"
  ERP_POSTGRES_USER: "erp"
  ERP_POSTGRES_PASSWORD: "replace-with-secret-manager-value"
  ERP_JWT_HS256_SECRET: "replace-with-secret-manager-value"
  ERP_INTERNAL_SERVICE_TOKEN: "replace-with-secret-manager-value"
  DOCUMENTS_ACCESS_TOKEN_SECRET: "replace-with-secret-manager-value"
  WEBHOOK_HUB_OUTBOUND_SIGNING_SECRET: "replace-with-secret-manager-value"
  OPENFGA_STORE_ID: "replace-with-openfga-store-id"
  OPENFGA_AUTHORIZATION_MODEL_ID: "replace-with-openfga-model-id"
