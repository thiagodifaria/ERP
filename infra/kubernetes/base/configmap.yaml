apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-runtime-config
  labels:
    app.kubernetes.io/name: erp
data:
  ERP_ENV: "production"
  ERP_AUTH_ENFORCEMENT: "enforced"
  ERP_SECURITY_LEVEL: "strict"
  ERP_ALLOW_BOOTSTRAP_TENANT_FALLBACK: "false"
  ERP_OPENFGA_ENFORCEMENT: "true"
  ERP_REQUIRE_REQUEST_SIGNATURE: "true"
  ERP_SECURITY_HEADERS: "enabled"
  ERP_AUDIT_LOG_REDACTION: "strict"
  ERP_INTERNAL_MTLS_MODE: "mesh-or-ingress"
  ERP_JWT_AUDIENCE: "erp-api"
  EDGE_HTTP_PORT: "8080"
  ANALYTICS_HTTP_PORT: "8086"
  PLATFORM_CONTROL_HTTP_PORT: "8098"
  SEARCH_HTTP_PORT: "8107"
  AI_GOVERNANCE_HTTP_PORT: "8108"
  OPENAI_MODEL: "gpt-4.1-mini"
  PROVIDER_ACTIVATION_HTTP_TIMEOUT_SECONDS: "8"
  DOCUMENT_INTELLIGENCE_PROVIDER: "manual"
  AWS_TEXTRACT_REGION: "us-east-1"
  GOOGLE_DOCUMENT_AI_PROCESSOR: ""
  FISCAL_CERTIFICATE_PROVIDER: ""
  FISCAL_CERTIFICATE_A3_PROVIDER: ""
  GDELT_BASE_URL: "https://api.gdeltproject.org"
  ANALYTICS_REPOSITORY_DRIVER: "postgres"
  PLATFORM_CONTROL_REPOSITORY_DRIVER: "postgres"
  SEARCH_REPOSITORY_DRIVER: "postgres"
  AI_GOVERNANCE_REPOSITORY_DRIVER: "postgres"
