apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-search
  labels:
    app.kubernetes.io/name: erp-search
    app.kubernetes.io/part-of: erp-platform
    app.kubernetes.io/component: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: erp-search
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp-search
        app.kubernetes.io/part-of: erp-platform
    spec:
      serviceAccountName: erp-workload
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: search
          image: ghcr.io/thiagodifaria/erp-search:1.4.6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8107
          envFrom:
            - configMapRef:
                name: erp-runtime-config
            - secretRef:
                name: erp-runtime-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
