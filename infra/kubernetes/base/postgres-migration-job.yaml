apiVersion: batch/v1
kind: Job
metadata:
  name: erp-postgres-migrations
  labels:
    app.kubernetes.io/name: erp
    app.kubernetes.io/component: migrations
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: erp
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      serviceAccountName: erp-workload
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrations
          image: ghcr.io/thiagodifaria/erp-migrations:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: erp-runtime-config
            - secretRef:
                name: erp-runtime-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
