worker_processes auto;

events {
  worker_connections 1024;
}

http {
  proxy_cache_path /var/cache/nginx/erp levels=1:2 keys_zone=erp_api_cache:10m max_size=128m inactive=5m use_temp_path=off;
  limit_req_zone $binary_remote_addr zone=erp_api_rate:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=erp_auth_sensitive:10m rate=5r/m;
  limit_req_zone $http_x_tenant_slug zone=erp_tenant_api:10m rate=120r/m;
  limit_req_zone $http_x_erp_auth_subject zone=erp_actor_api:10m rate=60r/m;
  limit_req_zone $binary_remote_addr zone=erp_abuse_sensitive:10m rate=20r/m;
  map $http_x_correlation_id $erp_correlation_id {
    "" $request_id;
    default $http_x_correlation_id;
  }
  client_max_body_size 8m;
  client_body_timeout 10s;
  client_header_timeout 10s;
  keepalive_timeout 30s;
  send_timeout 30s;

  upstream edge_backend { server edge:8080 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream identity_backend { server identity:8080 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream webhook_hub_backend { server webhook-hub:8082 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream crm_backend { server crm:8083 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream workflow_control_backend { server workflow-control:8084 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream workflow_runtime_backend { server workflow-runtime:8085 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream analytics_backend { server analytics:8086 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream documents_backend { server documents:8086 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream sales_backend { server sales:8087 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream engagement_backend { server engagement:8088 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream finance_backend { server finance:8089 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream simulation_backend { server simulation:8094 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream billing_backend { server billing:8095 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream rentals_backend { server rentals:8096 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream catalog_backend { server catalog:8097 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream platform_control_backend { server platform-control:8098 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream support_backend { server support:8099 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream supplier_backend { server supplier:8100 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream notification_backend { server notification:8101 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream fiscal_backend { server fiscal:8102 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream accounting_backend { server accounting:8103 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream inventory_backend { server inventory:8104 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream procurement_backend { server procurement:8105 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream banking_backend { server banking:8106 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream search_backend { server search:8107 max_fails=3 fail_timeout=10s; keepalive 16; }
  upstream ai_governance_backend { server ai-governance:8108 max_fails=3 fail_timeout=10s; keepalive 16; }

  server {
    listen 8080;
    server_tokens off;
    default_type application/json;

    add_header X-ERP-Gateway "erp-control-console" always;
    add_header X-Cache-Status $upstream_cache_status always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;

    proxy_http_version 1.1;
    proxy_connect_timeout 2s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_cache erp_api_cache;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 30s;
    proxy_cache_bypass $http_authorization $http_cache_control;
    proxy_no_cache $http_authorization $http_cache_control;
    limit_req_status 429;
    error_page 429 = @rate_limited;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Correlation-Id $erp_correlation_id;
    proxy_set_header Connection "";

    limit_req zone=erp_api_rate burst=60 nodelay;
    limit_req zone=erp_tenant_api burst=120 nodelay;
    limit_req zone=erp_actor_api burst=60 nodelay;

    location @rate_limited {
      add_header Cache-Control "no-store" always;
      return 429 '{"code":"rate_limit_exceeded","message":"Request rate limit exceeded."}';
    }

    location = /gateway/health {
      add_header Cache-Control "no-store" always;
      return 200 '{"service":"gateway","status":"ready","cache":"enabled","rateLimit":"enabled","passiveFailover":"enabled"}';
    }

    location = /health/live { proxy_pass http://edge_backend; }
    location = /health/ready { proxy_pass http://edge_backend; }

    location ~ /\.(?!well-known) {
      return 404 '{"code":"not_found","message":"Resource not found."}';
    }

    location = /api/identity/sessions/login {
      limit_req zone=erp_auth_sensitive burst=5 nodelay;
      proxy_pass http://identity_backend;
    }

    location = /api/identity/sessions/refresh {
      limit_req zone=erp_auth_sensitive burst=10 nodelay;
      proxy_pass http://identity_backend;
    }

    location ^~ /api/identity/password-recovery {
      limit_req zone=erp_auth_sensitive burst=5 nodelay;
      proxy_pass http://identity_backend;
    }

    location ^~ /api/documents/upload-sessions {
      client_max_body_size 64m;
      limit_req zone=erp_abuse_sensitive burst=20 nodelay;
      proxy_pass http://documents_backend;
    }

    location ~ ^/api/documents/attachments/.*/access-links$ {
      limit_req zone=erp_abuse_sensitive burst=20 nodelay;
      proxy_pass http://documents_backend;
    }

    location ^~ /api/webhook-hub/events {
      limit_req zone=erp_abuse_sensitive burst=30 nodelay;
      proxy_pass http://webhook_hub_backend;
    }

    location ^~ /api/billing/webhook-events {
      limit_req zone=erp_abuse_sensitive burst=20 nodelay;
      proxy_pass http://billing_backend;
    }

    location ^~ /api/crm/leads/bulk {
      limit_req zone=erp_abuse_sensitive burst=10 nodelay;
      proxy_pass http://crm_backend;
    }

    location ^~ /api/catalog/items/bulk {
      limit_req zone=erp_abuse_sensitive burst=10 nodelay;
      proxy_pass http://catalog_backend;
    }

    location ^~ /api/notification/center/bulk {
      limit_req zone=erp_abuse_sensitive burst=10 nodelay;
      proxy_pass http://notification_backend;
    }

    location = /api/supplier/suppliers/export {
      limit_req zone=erp_abuse_sensitive burst=10 nodelay;
      proxy_pass http://supplier_backend;
    }

    location = /api/support/cases/export {
      limit_req zone=erp_abuse_sensitive burst=10 nodelay;
      proxy_pass http://support_backend;
    }

    location ^~ /api/search/exports {
      limit_req zone=erp_abuse_sensitive burst=10 nodelay;
      proxy_pass http://search_backend;
    }

    location ^~ /api/ai-governance/runs {
      limit_req zone=erp_abuse_sensitive burst=20 nodelay;
      proxy_pass http://ai_governance_backend;
    }

    location /api/edge/ { proxy_pass http://edge_backend; }
    location /api/identity/ { proxy_pass http://identity_backend; }
    location /api/webhook-hub/ { proxy_pass http://webhook_hub_backend; }
    location /api/crm/ { proxy_pass http://crm_backend; }
    location /api/workflow-control/ { proxy_pass http://workflow_control_backend; }
    location /api/workflow-runtime/ { proxy_pass http://workflow_runtime_backend; }
    location /api/analytics/ { proxy_pass http://analytics_backend; }
    location /api/documents/ { proxy_pass http://documents_backend; }
    location /api/sales/ { proxy_pass http://sales_backend; }
    location /api/engagement/ { proxy_pass http://engagement_backend; }
    location /api/finance/ { proxy_pass http://finance_backend; }
    location /api/simulation/ { proxy_pass http://simulation_backend; }
    location /api/billing/ { proxy_pass http://billing_backend; }
    location /api/rentals/ { proxy_pass http://rentals_backend; }
    location /api/catalog/ { proxy_pass http://catalog_backend; }
    location /api/platform-control/ { proxy_pass http://platform_control_backend; }
    location /api/search/ { proxy_pass http://search_backend; }
    location /api/ai-governance/ { proxy_pass http://ai_governance_backend; }
    location /api/support/ { proxy_pass http://support_backend; }
    location /api/supplier/ { proxy_pass http://supplier_backend; }
    location /api/notification/ { proxy_pass http://notification_backend; }
    location /api/fiscal/ { proxy_pass http://fiscal_backend; }
    location /api/accounting/ { proxy_pass http://accounting_backend; }
    location /api/inventory/ { proxy_pass http://inventory_backend; }
    location /api/procurement/ { proxy_pass http://procurement_backend; }
    location /api/banking/ { proxy_pass http://banking_backend; }
  }
}
